name: build_on_push

on: [push]

env:
  BUILD_TYPE: Release

jobs:

  #---------------------------------------------------------------------
  # MacOS CI

  build_MacOS:
    runs-on: macOS-latest

    steps:
    - uses: actions/checkout@v4
      with:
       submodules: 'recursive'

    - name: Install dependencies
      run:  brew install SDL2

    - name: Prepare build
      run: mkdir -p ${{github.workspace}}/build/macOS

    - name: Configure build
      working-directory: ${{github.workspace}}/build/macOS
      shell: bash
      run: cmake -DBUILD_TESTING=ON ../..

    - name: Build
      working-directory: ${{github.workspace}}/build/macOS
      shell: bash
      run: make

    - name: Test
      working-directory: ${{github.workspace}}/build/macOS
      shell: bash
      run: ctest -V -C $BUILD_TYPE

  #---------------------------------------------------------------------
  # RP2040 CI

  build_rp2040:
    runs-on: macOS-latest

    steps:
    - uses: actions/checkout@v4
      with:
       submodules: 'recursive'

    - name: Install dependencies
      run:  brew install arm-none-eabi-gcc

    - name: Prepare build
      run: mkdir -p ${{github.workspace}}/build/rp2040

    - name: Configure build
      working-directory: ${{github.workspace}}/build/rp2040
      shell: bash
      run: cmake -DPDK_TARGET=rp2040 -DCMAKE_TOOLCHAIN_FILE=PDK/MTL/rp2040/target/toolchain.cmake ../..

    - name: Build
      working-directory: ${{github.workspace}}/build/rp2040
      shell: bash
      run: make

  #---------------------------------------------------------------------
  # RP2350 CI

  build_rp2350:
    runs-on: macOS-latest

    steps:
    - uses: actions/checkout@v4
      with:
       submodules: 'recursive'

    - name: Install dependencies
      run:  brew install arm-none-eabi-gcc

    - name: Prepare build
      run: mkdir -p ${{github.workspace}}/build/rp2350

    - name: Configure build
      working-directory: ${{github.workspace}}/build/rp2350
      shell: bash
      run: cmake -DPDK_TARGET=rp2350 -DCMAKE_TOOLCHAIN_FILE=PDK/MTL/rp2350/target/toolchain.cmake ../..

    - name: Build
      working-directory: ${{github.workspace}}/build/rp2350
      shell: bash
      run: make

  #---------------------------------------------------------------------
  # Linux CI

  build_Linux:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
       submodules: 'recursive'

    - name: Install dependencies
      run: |
           sudo apt-get update
           sudo apt-get install -y libsdl2-dev

    - name: Prepare build
      run: mkdir -p ${{github.workspace}}/build/linux

    - name: Configure CMake
      shell: bash
      working-directory: ${{github.workspace}}/build/linux
      run: export SDL2_DIR=${{github.workspace}}/.github/workflows; cmake -DBUILD_TESTING=ON ../..

    - name: Build
      working-directory: ${{github.workspace}}/build/linux
      shell: bash
      run: make

    - name: Test
      working-directory: ${{github.workspace}}/build/linux
      shell: bash
      run: ctest -V -C $BUILD_TYPE
